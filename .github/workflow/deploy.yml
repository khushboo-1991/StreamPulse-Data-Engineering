# ============================================================
# deploy.yml
# StreamPulse - GitHub Actions CI/CD Pipeline
# Automatically deploys notebooks to Databricks
# when code is pushed to master branch
# ============================================================

name: StreamPulse CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  # ── Job 1: Test Code Quality ────────────────────────────────
  test:
    name: Test Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Check Code Style
        run: |
          flake8 01_bronze_ingestion.py \
          02_silver_transformation.py \
          03_gold_star_schema.py \
          04_delta_live_tables.py \
          05_data_quality.py \
          --max-line-length=100 \
          --ignore=E501,W503
        continue-on-error: true

      - name: Verify Files Exist
        run: |
          echo "Checking required files..."
          test -f 01_bronze_ingestion.py && echo "✅ 01_bronze_ingestion.py exists"
          test -f 02_silver_transformation.py && echo "✅ 02_silver_transformation.py exists"
          test -f 03_gold_star_schema.py && echo "✅ 03_gold_star_schema.py exists"
          test -f 04_delta_live_tables.py && echo "✅ 04_delta_live_tables.py exists"
          test -f 05_data_quality.py && echo "✅ 05_data_quality.py exists"
          echo "✅ All files verified!"

  # ── Job 2: Deploy to Databricks ────────────────────────────
  deploy:
    name: Deploy Notebooks to Databricks
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks configure --token << EOF
          $DATABRICKS_HOST
          $DATABRICKS_TOKEN
          EOF

      - name: Deploy Notebooks to Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "🚀 Deploying StreamPulse notebooks..."
          databricks workspace mkdirs /StreamPulse
          databricks workspace import 01_bronze_ingestion.py /StreamPulse/01_bronze_ingestion --language PYTHON --overwrite
          databricks workspace import 02_silver_transformation.py /StreamPulse/02_silver_transformation --language PYTHON --overwrite
          databricks workspace import 03_gold_star_schema.py /StreamPulse/03_gold_star_schema --language PYTHON --overwrite
          databricks workspace import 04_delta_live_tables.py /StreamPulse/04_delta_live_tables --language PYTHON --overwrite
          databricks workspace import 05_data_quality.py /StreamPulse/05_data_quality --language PYTHON --overwrite
          echo "✅ Notebooks deployed successfully!"

      - name: Verify Deployment
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "📋 Listing deployed notebooks..."
          databricks workspace list /StreamPulse
          echo "✅ Deployment verified!"

  # ── Job 3: Notify Success ───────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 StreamPulse deployment successful!"
          echo "✅ All notebooks deployed to Databricks"
          echo "🚀 Pipeline is ready to run"
          echo "Pipeline: Bronze → Silver → Gold → DLT → ADF"

      - name: Deployment Failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ StreamPulse deployment failed!"
          echo "Please check the logs above"
